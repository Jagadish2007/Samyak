<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            flex: 1;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        canvas {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<div class="cards">
    <div class="card">
        <h3>Total Users</h3>
        <p id="users">0</p>
    </div>

    <div class="card">
        <h3>Total Courses</h3>
        <p id="courses">0</p>
    </div>

    <div class="card">
        <h3>Total Enrollments</h3>
        <p id="enrollments">0</p>
    </div>
</div>

<canvas id="chart" width="400" height="100"></canvas>

<section class="section">
<div class="container">

<div class="section-heading">
    <h2>Student Progress</h2>
</div>

<div id="progress-container"></div>

</div>
</section>

<script>
fetch("http://localhost:8080/api/admin/stats")
.then(res => res.json())
.then(data => {

    document.getElementById("users").innerText = data.users;
    document.getElementById("courses").innerText = data.courses;
    document.getElementById("enrollments").innerText = data.enrollments;

    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Users', 'Courses', 'Enrollments'],
            datasets: [{
                label: 'LMS Stats',
                data: [data.users, data.courses, data.enrollments]
            }]
        }
    });

    function loadProgress() {

    fetch("http://localhost:8080/api/progress")
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("progress-container");
        container.innerHTML = "";

        data.forEach(item => {

            container.innerHTML += `
                <div style="margin-bottom:15px; padding:10px; background:#fff; border-radius:8px;">
                    <b>${item.student}</b> - ${item.course}

                    <div style="background:#ddd; height:10px; border-radius:5px; margin-top:5px;">
                        <div style="
                            width:${item.progress}%;
                            background:green;
                            height:10px;
                            border-radius:5px;">
                        </div>
                    </div>

                    <small>${item.progress}% Completed</small>
                </div>
            `;
        });

    });
}
loadProgress();
});
</script>

</body>
</html>
