<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to VidyaSethu - Smart Learning Platform">
    <title>Login | VidyaSethu</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-deep: #6B2E1A;
            --primary-rich: #8B3A20;
            --primary-warm: #A0522D;
            --primary-soft: #C17A4E;
            --primary-light: #E8C9A3;
            --primary-glow: #F5E6D3;
            --dark-charcoal: #1E2A32;
            --slate-gray: #2C3E40;
            --accent-gold: #D4A373;
            --white: #FFFFFF;
            --shadow-sm: 0 10px 30px -12px rgba(0,0,0,0.15);
            --shadow-md: 0 20px 40px -15px rgba(0,0,0,0.2);
            --shadow-hover: 0 25px 45px -12px rgba(107,46,26,0.3);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #8B5E3C 0%, #C17A4E 50%, #D4A373 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="30" cy="30" r="3" fill="rgba(255,255,255,0.15)"/><circle cx="170" cy="80" r="4" fill="rgba(255,255,255,0.1)"/><circle cx="100" cy="150" r="2" fill="rgba(255,255,255,0.12)"/><circle cx="50" cy="180" r="3" fill="rgba(255,255,255,0.08)"/><circle cx="150" cy="190" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            background-repeat: repeat;
            opacity: 0.4;
            pointer-events: none;
            animation: floatBg 20s linear infinite;
        }

        @keyframes floatBg {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Navigation Bar - Glassmorphism */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 2px 25px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
        }

        .navbar-logo a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-rich), var(--primary-warm));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            font-family: 'Playfair Display', serif;
        }

        .logo-sub {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--primary-soft);
            letter-spacing: 1px;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            font-weight: 600;
            color: var(--slate-gray);
            transition: var(--transition);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link i {
            font-size: 0.9rem;
            color: var(--primary-warm);
        }

        .nav-link:hover {
            color: var(--primary-rich);
            transform: translateY(-2px);
        }

        .nav-link.active {
            color: var(--primary-rich);
            border-bottom: 2px solid var(--primary-warm);
            padding-bottom: 4px;
        }

        .navbar-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-soft), transparent);
        }

        /* Login Container */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 100px 20px 60px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            padding: 2.5rem 2rem;
            border-radius: 48px;
            width: 420px;
            max-width: 90%;
            text-align: center;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 215, 180, 0.5);
            transition: var(--transition);
            animation: slideUp 0.5s ease-out;
        }

        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icon & Title */
        .login-icon {
            background: linear-gradient(135deg, var(--primary-glow), #FFF1E6);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 5px 15px rgba(107, 46, 26, 0.2);
        }

        .login-icon i {
            font-size: 2.5rem;
            color: var(--primary-warm);
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-rich), var(--primary-warm));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            font-family: 'Playfair Display', serif;
        }

        .welcome-text {
            color: #7A8B8F;
            font-size: 0.85rem;
            margin-bottom: 1.8rem;
        }

        /* Input Fields */
        .input-group {
            position: relative;
            margin: 1.2rem 0;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-warm);
            font-size: 1rem;
            transition: var(--transition);
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border-radius: 60px;
            border: 1.5px solid #E8E0D8;
            font-size: 1rem;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            background: #FEFCFA;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-warm);
            box-shadow: 0 0 0 3px rgba(160, 82, 45, 0.15);
            background: white;
        }

        .input-group input:focus + i {
            color: var(--primary-rich);
            transform: translateY(-50%) scale(1.05);
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, var(--primary-warm), var(--primary-rich));
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 58, 32, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Register Link */
        .register-link {
            margin-top: 1.8rem;
            color: #7A8B8F;
            font-size: 0.9rem;
        }

        .register-link a {
            color: var(--primary-warm);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .register-link a:hover {
            color: var(--primary-rich);
            text-decoration: underline;
        }

        /* Error Message */
        .error-msg {
            background: #FEE2E2;
            color: #C0392B;
            padding: 12px;
            border-radius: 60px;
            margin-top: 1rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Success Animation */
        .success-check {
            display: inline-block;
            animation: checkPop 0.4s ease-out;
        }

        @keyframes checkPop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Forgot Password Link */
        .forgot-link {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-link a {
            font-size: 0.7rem;
            color: #A0AAB0;
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-link a:hover {
            color: var(--primary-warm);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.8rem 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .navbar-container {
                padding: 0.6rem 1rem;
            }
            .logo-main {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="index.html">
                    <div class="logo-text">
                        <div class="logo-main">VidyaSethu</div>
                        <div class="logo-sub">Smart Learning Platform</div>
                    </div>
                </a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                <li class="nav-item"><a href="programs.html" class="nav-link"><i class="fas fa-graduation-cap"></i> Programs</a></li>
                <li class="nav-item"><a href="login.html" class="nav-link active"><i class="fas fa-sign-in-alt"></i> Login</a></li>
            </ul>
        </div>
    </nav>
    <div class="navbar-divider"></div>

    <!-- Login Form -->
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-icon">
                <i class="fas fa-chalkboard-user"></i>
            </div>
            <h2>Welcome Back</h2>
            <p class="welcome-text">Login to continue your learning journey</p>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email address" autocomplete="email">
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            </div>

            <div class="forgot-link">
                <a href="#"><i class="fas fa-question-circle"></i> Forgot password?</a>
            </div>

            <button class="login-btn" onclick="login()">
                <i class="fas fa-arrow-right-to-bracket"></i> Sign In
            </button>

            <div class="register-link">
                New to VidyaSethu? <a href="register.html">Create an account <i class="fas fa-arrow-right"></i></a>
            </div>
            <div id="errorMsg" style="margin-top: 1rem;"></div>
        </div>
    </div>

    <script>
        // Get DOM elements
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const errorDiv = document.getElementById("errorMsg");

        // Add enter key support
        emailInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") login();
        });
        passwordInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") login();
        });

        // Login function (original logic preserved)
        function login() {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            // Clear previous error
            errorDiv.innerHTML = "";

            // Validation
            if (!email || !password) {
                showError("Please fill in both email and password");
                return;
            }

            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError("Please enter a valid email address");
                return;
            }

            // Show loading state
            const loginBtn = document.querySelector(".login-btn");
            const originalBtnText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Signing in...';
            loginBtn.disabled = true;

            // API Call - ORIGINAL ENDPOINT PRESERVED
            fetch("http://localhost:8080/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                // Original logic preserved exactly
                if (data.success) {
                    // Store user data in localStorage as per original
                    localStorage.setItem("user", JSON.stringify(data.user));
                    localStorage.setItem("role", data.user.role);

                    // Show success animation
                    loginBtn.innerHTML = '<i class="fas fa-check-circle success-check"></i> Success!';
                    
                    setTimeout(() => {
                        alert("Login successful");
                        
                        // Redirect based on role - ORIGINAL LOGIC
                        if (data.user.role === "ADMIN") {
                            window.location.href = "admin-dashboard.html";
                        } else {
                            window.location.href = "index.html";
                        }
                    }, 500);
                } else {
                    showError(data.message || "Invalid email or password");
                    loginBtn.innerHTML = originalBtnText;
                    loginBtn.disabled = false;
                }
            })
            .catch(err => {
                console.error("Login error:", err);
                showError("Server error. Please make sure the backend is running on port 8080");
                loginBtn.innerHTML = originalBtnText;
                loginBtn.disabled = false;
            });
        }

        // Helper function to show error messages
        function showError(message) {
            errorDiv.innerHTML = `
                <div class="error-msg">
                    <i class="fas fa-exclamation-circle"></i>
                    ${message}
                </div>
            `;
            // Auto-remove after 4 seconds
            setTimeout(() => {
                if (errorDiv.innerHTML) {
                    errorDiv.innerHTML = "";
                }
            }, 4000);
        }

        // Pre-fill demo credentials for testing (optional - remove in production)
        // Uncomment below for quick testing
        /*
        emailInput.value = "student@example.com";
        passwordInput.value = "password";
        */
    </script>

</body>
</html>
