<script>
    function addCourse() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;

    if (!title || !description) {
        alert("Please fill all fields");
        return;
    }

    fetch("http://localhost:8080/api/courses", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: title,
            description: description
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Course added successfully!");

        // clear fields
        document.getElementById("title").value = "";
        document.getElementById("description").value = "";

        // reload courses
        location.reload();
    })
    .catch(err => console.error("Error:", err));
}
</script>

<script>
fetch("http://localhost:8080/api/courses")
  .then(res => res.json())
  .then(data => {

    console.log("FULL DATA:", data);

    const container = document.getElementById("courses-container");

    container.innerHTML = "";

    // ✅ FIX HERE
    const courses = data.courses; // ✅ FIXED (DIRECTLY USE data)

    if (!courses || courses.length === 0) {
      container.innerHTML = "<h3>No courses found</h3>";
      return;
    }

    courses.forEach(course => {
      container.innerHTML += `
        <div class="program-card">
            <div class="program-icon">📚</div>
            <h3>${course.title}</h3>
            <p>${course.description}</p>

            <div style="margin-top: 1rem;">
                <button class="btn btn-primary"
                    onclick="window.location.href='enroll.html?id=${course.id}&title=${encodeURIComponent(course.title)}&price=${course.price}'">
                    Enroll Now
                </button>
            </div>
        </div>
      `;
    });
  })
  .catch(err => {
    console.error("Error:", err);
  });
  onclick="window.location.href='enroll.html?id=${course.id}&title=${encodeURIComponent(course.title)}&price=${course.price}'"
</script>
