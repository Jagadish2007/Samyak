<script>
/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

/* ================= ADD COURSE ================= */
function addCourse() {

    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const price = parseFloat(document.getElementById("price").value);

    // ✅ VALIDATION
    if (!title || !description || isNaN(price)) {
        alert("Please fill all fields correctly");
        return;
    }

    const course = {
        title: title,
        description: description,
        price: price   // ✅ IMPORTANT
    };

    console.log("Sending Course:", course); // DEBUG

    fetch("http://localhost:8080/api/courses", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Role": localStorage.getItem("role")
        },
        body: JSON.stringify(course)
    })
    .then(res => res.json())
    .then(data => {
        alert("Course added successfully!");

        // ✅ clear fields
        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
        document.getElementById("price").value = "";

        location.reload();
    })
    .catch(err => {
        console.error(err);
        alert("Error adding course");
    });
}

/* ================= LOAD USERS ================= */
function loadUsers() {
    fetch("http://localhost:8080/api/users")
    .then(res => res.json())
    .then(users => {
        const container = document.getElementById("users-container");
        container.innerHTML = "";

        users.forEach(user => {
            const row = `
                <div style="display:grid; grid-template-columns: 1fr 2fr 1fr 1fr;">
                    <div>${user.name}</div>
                    <div>${user.email}</div>
                    <div>${user.role}</div>
                    <div>
                        <button onclick="deleteUser(${user.id})" 
                                style="background:red;">
                            Delete ❌
                        </button>
                    </div>
                </div>
            `;
            container.innerHTML += row;
        });
    })
    .catch(err => console.error(err));
}
/* ✅ LOAD ON PAGE START */
loadUsers();

function deleteCourse(id) {

    if (!confirm("Are you sure to delete this course?")) return;

    fetch(`http://localhost:8080/api/courses/${id}`, {
        method: "DELETE"
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        location.reload();
    })
    .catch(err => console.error(err));
}

function deleteUser(id) {

    if (!confirm("Delete this user?")) return;

    fetch(`http://localhost:8080/api/users/${id}`, {
        method: "DELETE"
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadUsers(); // refresh list
    })
    .catch(err => console.error(err));
}
</script>

<script>
async function addCourse() {

    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const price = document.getElementById("price").value;
    const files = document.getElementById("file").files;

    // 1️⃣ Create course first
    await fetch("http://localhost:8080/api/courses", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ title, description, price })
    });

    // 2️⃣ Upload files
    for (let i = 0; i < files.length; i++) {

        const formData = new FormData();
        formData.append("file", files[i]);

        await fetch(`http://localhost:8080/api/files/upload/${title}`, {
            method: "POST",
            body: formData
        });
    }

    alert("Course + Files uploaded successfully!");
    location.reload();
}
</script>
