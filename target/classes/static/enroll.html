<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enroll Course</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* MODAL BACKGROUND */
#enrollModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FORM BOX */
.modal-box {
    background: #fff;
    padding: 20px;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    width: 100%;
    border: none;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}

.submit-btn {
    background: #8b5e3c;
    color: white;
}

.cancel-btn {
    background: #ccc;
}
</style>
</head>

<body>

<div id="enrollModal">
    <div class="modal-box">
        
        <h3 id="courseTitle">Course</h3>

        <input type="text" id="enrollName" placeholder="Enter Name">
        <input type="email" id="enrollEmail" placeholder="Enter Email">

        <p id="coursePrice"></p>

        <button class="submit-btn" onclick="submitEnroll()">Submit</button>
        <button class="cancel-btn" onclick="goBack()">Cancel</button>

    </div>
</div>

<script>
let courseId = null;
let price = 0;

/* GET DATA FROM URL */
const params = new URLSearchParams(window.location.search);

// ✅ FIX: convert to correct types
courseId = parseInt(params.get("id"));
const title = params.get("title");
price = parseFloat(params.get("price"));

if (isNaN(price)) {
    price = 0;
}

document.getElementById("courseTitle").innerText = title;
document.getElementById("coursePrice").innerText = "Price: ₹" + price;

/* SUBMIT */
function submitEnroll() {

    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        alert("Please login first!");
        window.location.href = "login.html";
        return;
    }

    const name = document.getElementById("enrollName").value.trim();
    const email = document.getElementById("enrollEmail").value.trim();

    if (!name || !email) {
        alert("Please fill all fields");
        return;
    }

    const data = {
        userId: Number(user.id),     // ✅ FIX
        courseId: courseId,          // ✅ FIX
        name: name,
        email: email,
        price: price                // ✅ FIX
    };

    console.log("Sending:", data); // 🔍 DEBUG
    

    fetch("http://localhost:8080/api/enroll", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(() => {
        alert("Enrollment Successful ✅");
        window.location.href = "index.html";
    })
    .catch(err => {
        console.error(err);
        alert("Error saving enrollment");
    });
}
</script>

</body>
</html>
